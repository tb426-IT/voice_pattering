<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOICE PATTERNS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300;400&family=Cinzel:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ffff00;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'Josefin Sans', sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── HUD overlay ── */
#hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

/* Title */
#title-block {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}
#title-block h1 {
  font-family: 'Cinzel', serif;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}
#mode-name {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
  text-shadow: 0 0 30px currentColor;
  transition: color 0.8s, text-shadow 0.8s;
}

/* Bottom controls */
#controls {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 12px;
  padding: 24px;
  pointer-events: all;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
}

.mode-btn {
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 0;
}
.mode-btn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.4); }
.mode-btn.active {
  color: #fff;
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.06);
  text-shadow: 0 0 12px #fff;
}

#start-btn {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: #fff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  padding: 10px 28px;
  cursor: pointer;
  transition: all 0.4s;
  text-transform: uppercase;
}
#start-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: #fff;
  box-shadow: 0 0 24px rgba(255,255,255,0.2);
}
#start-btn.live {
  color: rgba(255,255,255,0.4);
  border-color: rgba(255,255,255,0.2);
}

/* Left side freq bars */
#freq-sidebar {
  position: absolute;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.freq-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.freq-lbl {
  font-size: 8px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
  width: 40px;
  text-align: right;
}
.freq-track {
  width: 60px;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 0;
  overflow: hidden;
}
.freq-fill {
  height: 100%;
  width: 0%;
  border-radius: 0;
  transition: width 0.05s;
}

/* Right side: note display */
#note-display {
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  pointer-events: none;
}
#note-name {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  font-weight: 700;
  color: rgba(255,255,255,0.08);
  line-height: 1;
  transition: color 0.2s, text-shadow 0.2s;
  text-shadow: none;
}
#note-freq {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.15);
  margin-top: 4px;
  transition: color 0.2s;
}

/* Idle hint */
#hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  transition: opacity 0.8s;
}
#hint p {
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 100;
  font-size: 13px;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}
#hint.hidden { opacity: 0; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="title-block">
    <h1>Voice Pattern Generator</h1>
    <div id="mode-name">LISSAJOUS</div>
  </div>

  <div id="freq-sidebar">
    <div class="freq-row">
      <span class="freq-lbl">BASS</span>
      <div class="freq-track"><div class="freq-fill" id="bar-bass" style="background:#ff6ec7"></div></div>
    </div>
    <div class="freq-row">
      <span class="freq-lbl">LOW MID</span>
      <div class="freq-track"><div class="freq-fill" id="bar-lowmid" style="background:#ffb347"></div></div>
    </div>
    <div class="freq-row">
      <span class="freq-lbl">MID</span>
      <div class="freq-track"><div class="freq-fill" id="bar-mid" style="background:#7fffb2"></div></div>
    </div>
    <div class="freq-row">
      <span class="freq-lbl">HIGH MID</span>
      <div class="freq-track"><div class="freq-fill" id="bar-highmid" style="background:#7fdbff"></div></div>
    </div>
    <div class="freq-row">
      <span class="freq-lbl">TREBLE</span>
      <div class="freq-track"><div class="freq-fill" id="bar-treble" style="background:#c77dff"></div></div>
    </div>
  </div>

  <div id="note-display">
    <div id="note-name">—</div>
    <div id="note-freq">— Hz</div>
  </div>

  <div id="hint"><p>Speak or sing into your microphone</p></div>

  <div id="controls">
    <button class="mode-btn active" data-mode="0">Lissajous</button>
    <button class="mode-btn" data-mode="1">Mandala</button>
    <button class="mode-btn" data-mode="2">Constellation</button>
    <button class="mode-btn" data-mode="3">Interference</button>
    <button class="mode-btn" data-mode="4">All Modes</button>
    <button id="start-btn">Activate Mic</button>
  </div>
</div>

<script>
/* JS unchanged */
</script>
</body>
</html>
